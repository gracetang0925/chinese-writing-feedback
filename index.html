<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华文写作批改工具</title>
<style>
:root {
  --teal: #0F6E56;
  --teal-light: #e6f4f1;
  --gold: #B8860B;
  --gold-light: #fef7e0;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --bg: #f8f7f4;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e8e4dd;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.wrapper { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
.header { text-align: center; margin-bottom: 2.5rem; }
.header h1 { font-size: 1.9rem; font-weight: 700; color: var(--teal); letter-spacing: 0.04em; margin-bottom: 0.4rem; }
.header p { color: var(--muted); font-size: 0.93rem; }
.mode-tabs { display: flex; gap: 0.6rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.mode-tab {
  flex: 1; min-width: 140px; padding: 0.85rem 1rem;
  border: 2px solid var(--border); border-radius: 12px; background: var(--card);
  cursor: pointer; font-size: 0.9rem; font-family: inherit; text-align: center;
  transition: all 0.2s; color: var(--muted);
}
.mode-tab:hover { border-color: #bbb; color: var(--text); }
.mode-tab.active-teal   { border-color: var(--teal);   background: var(--teal-light);   color: var(--teal);   font-weight: 600; }
.mode-tab.active-gold   { border-color: var(--gold);   background: var(--gold-light);   color: var(--gold);   font-weight: 600; }
.mode-tab.active-purple { border-color: var(--purple); background: var(--purple-light); color: var(--purple); font-weight: 600; }
.mode-tab .tab-icon { font-size: 1.3rem; display: block; margin-bottom: 0.25rem; }
.mode-tab .tab-desc { font-size: 0.76rem; margin-top: 0.2rem; opacity: 0.8; }
.sample-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }
.sample-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
.sample-btn {
  padding: 0.3rem 0.75rem; font-size: 0.8rem; border: 1.5px solid var(--border);
  border-radius: 20px; background: var(--card); cursor: pointer; font-family: inherit;
  color: var(--text); transition: all 0.2s;
}
.sample-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
.input-section { margin-bottom: 1rem; }
.input-label { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; }
textarea {
  width: 100%; min-height: 180px; padding: 1rem; font-family: inherit; font-size: 1rem;
  line-height: 1.8; border: 2px solid var(--border); border-radius: 12px; background: var(--card);
  resize: vertical; transition: border-color 0.2s; color: var(--text);
}
textarea:focus { outline: none; border-color: var(--teal); }
.submit-row { display: flex; gap: 0.7rem; margin-bottom: 1.2rem; }
.submit-btn {
  flex: 1; padding: 0.9rem; background: var(--teal); color: #fff; border: none;
  border-radius: 12px; font-size: 1rem; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
}
.submit-btn:hover { background: #0a5240; }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { background: #aaa; cursor: not-allowed; }
.clear-btn {
  padding: 0.9rem 1.4rem; border: 2px solid var(--border); border-radius: 12px;
  background: var(--card); color: var(--muted); font-size: 0.9rem; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
}
.clear-btn:hover { border-color: #bbb; color: var(--text); }
.error-msg {
  display: none; padding: 0.75rem 1rem; background: #fff0f0;
  border: 1.5px solid #f5c6c6; border-radius: 10px; color: #c0392b;
  font-size: 0.88rem; margin-bottom: 1rem;
}
.loading { display: none; text-align: center; padding: 2rem; background: var(--card); border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
.loading.visible { display: block; }
.brush-anim { font-size: 2.5rem; animation: bounce 1s infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
.loading-text { margin-top: 0.8rem; color: var(--muted); font-size: 0.9rem; }
.result-section { display: none; background: var(--card); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; margin-top: 0.5rem; }
.result-section.visible { display: block; }
.result-header { display: flex; align-items: center; padding: 1rem 1.3rem; border-bottom: 1px solid var(--border); gap: 0.7rem; }
.mode-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.82rem; font-weight: 600; }
.badge-teal   { background: var(--teal-light);   color: var(--teal);   }
.badge-gold   { background: var(--gold-light);   color: var(--gold);   }
.badge-purple { background: var(--purple-light); color: var(--purple); }
.result-content { padding: 1.3rem 1.5rem; font-size: 0.97rem; line-height: 1.9; }
.result-content h3 { color: var(--teal); margin: 1.1rem 0 0.4rem; font-size: 0.95rem; }
.result-content strong { color: #333; }
.error-highlight { background: #fff0f0; color: #c0392b; border-radius: 3px; padding: 0 2px; }
.suggestion { color: var(--teal); margin: 0.25rem 0; }
.praise { color: #27ae60; margin: 0.25rem 0; }
.score-row { display: flex; gap: 1rem; padding: 1rem 1.5rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
.score-chip { flex: 1; min-width: 90px; text-align: center; padding: 0.6rem; background: var(--bg); border-radius: 10px; }
.score-label { font-size: 0.76rem; color: var(--muted); }
.score-val { font-size: 1.5rem; font-weight: 700; color: var(--teal); }
.action-row { display: flex; gap: 0.6rem; padding: 0.9rem 1.3rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
.action-pill {
  padding: 0.4rem 0.9rem; border: 1.5px solid var(--border); border-radius: 20px;
  background: transparent; font-size: 0.82rem; font-family: inherit; cursor: pointer;
  color: var(--text); transition: all 0.2s;
}
.action-pill:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
.footer { text-align: center; margin-top: 3rem; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>✍️ 华文写作批改工具</h1>
    <p>Chinese Writing Feedback Tool · 三种反馈模式 · 适合二语学习者</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active-teal" onclick="setMode('ai')" id="tab-ai">
      <span class="tab-icon">🤖</span>AI 反馈
      <div class="tab-desc">直接纠错，给出答案</div>
    </button>
    <button class="mode-tab" onclick="setMode('teacher')" id="tab-teacher">
      <span class="tab-icon">👩‍🏫</span>教师反馈
      <div class="tab-desc">启发引导，思考为主</div>
    </button>
    <button class="mode-tab" onclick="setMode('hybrid')" id="tab-hybrid">
      <span class="tab-icon">🤝</span>人机协同
      <div class="tab-desc">AI批改 + 教师建议</div>
    </button>
  </div>

  <div class="sample-row">
    <span class="sample-label">试试样本文章 →</span>
    <button class="sample-btn" onclick="loadSample(0)">我的家庭（初级）</button>
    <button class="sample-btn" onclick="loadSample(1)">环境保护（中级）</button>
    <button class="sample-btn" onclick="loadSample(2)">城市生活（中高级）</button>
  </div>

  <div class="input-section">
    <div class="input-label">
      <span>粘贴或输入华文作文</span>
      <span id="charCount">0 字</span>
    </div>
    <textarea id="essayInput" placeholder="在此输入华文作文内容……&#10;&#10;例如：我很喜欢我的学校。我的学校有很多同学和老师。每天我都去学校学习中文。" oninput="updateCount()"></textarea>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="submit-row">
    <button class="submit-btn" id="submitBtn" onclick="getFeedback()">
      <span id="btnText">获取反馈</span>
    </button>
    <button class="clear-btn" onclick="clearAll()">清除</button>
  </div>

  <div class="loading" id="loading">
    <div class="brush-anim">✍️</div>
    <div class="loading-text" id="loadingText">正在批改中，请稍候…</div>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <span id="modeBadge" class="mode-badge badge-teal">🤖 AI 反馈</span>
      <span style="font-size:12px;color:var(--muted);margin-left:auto;" id="resultMeta"></span>
    </div>
    <div class="result-content" id="resultContent"></div>
    <div class="score-row" id="scoreRow"></div>
    <div class="action-row">
      <button class="action-pill" onclick="copyResult()">📋 复制反馈</button>
      <button class="action-pill" onclick="clearAll()">重新批改</button>
    </div>
  </div>

  <div class="footer">华文写作批改工具 · Grace Tang · 2026</div>
</div>

<script>
// ⚠️ 完成 Cloudflare Worker 部署后，把下面这行替换成你的 Worker 网址
const WORKER_URL = "https://YOUR_WORKER_NAME.YOUR_SUBDOMAIN.workers.dev";

const SAMPLES = [
  `我的家庭有四个人。我的爸爸是一个医生，他每天都很忙。我的妈妈在家里工作，她很爱我。我有一个哥哥，他比我大三岁，我们经常一起玩游戏。我很爱我的家庭，我们的关系很好。周末的时候，我们一家人会去公园散步或者去餐厅吃饭。我觉得家庭是最重要的。`,
  `环境保护是现在很重要的问题。因为人们使用太多的塑料和浪费很多水，所以环境变得很差。我们应该减少使用塑料袋，改用环保的袋子。另外，我们也要节约用水，不要开着水龙头刷牙。政府也应该制定更多的环保政策来保护我们的地球。如果每个人都做一点点，地球会变得更好。`,
  `随着城市化的快速发展，越来越多的人选择在城市生活。城市给人们提供了更多的就业机会和方便的生活设施，但同时也带来了一些问题，比如交通堵塞、空气污染和生活节奏太快。住在城市里，虽然生活很方便，超市和医院都在附近，可是有时候会感到很孤独，邻居之间很少交流。我认为城市和农村各有优点，最重要的是找到适合自己的生活方式。`
];

const MODES = {
  ai: {
    label: '🤖 AI 反馈', badge: 'badge-teal',
    prompt: `你是一位专业的华文二语（CFL）写作批改助手。请对以下华文作文进行详细批改，提供AI直接纠错式反馈。\n\n要求：\n1. 【语法与词汇错误】：找出并直接指出所有语法错误、用词不当、标点问题，给出正确答案\n2. 【句子结构】：分析句子结构，指出改进之处并给出修改建议\n3. 【内容与逻辑】：评价文章内容组织和逻辑连贯性\n4. 【亮点】：指出文章中写得好的地方\n5. 【评分】：格式为"准确性：X分，流利度：X分，内容：X分"（满分10分）\n\n用简体中文回答，语气专业但友好。`
  },
  teacher: {
    label: '👩‍🏫 教师反馈', badge: 'badge-gold',
    prompt: `你是一位经验丰富的华文教师，用启发式、引导式的方式批改作文。\n\n要求：\n1. 【引导性提问】：不直接给答案，通过提问引导学生思考\n2. 【鼓励与肯定】：先肯定亮点，再温和指出改进之处\n3. 【举例说明】：通过举例帮助学生理解语言规律\n4. 【反思问题】：结尾给出2-3个引导自我反思的问题\n5. 【整体评价】：用描述性语言评价（不给分数）\n\n语气温和鼓励，像真实的华文老师。`
  },
  hybrid: {
    label: '🤝 人机协同', badge: 'badge-purple',
    prompt: `你是人机协同的华文写作批改系统，结合AI精确分析和教师人性化指导。\n\n**第一部分：AI精确分析**\n- 列出所有具体错误，给出正确答案\n- 量化评分：准确性：X分，流利度：X分，内容：X分（满分10分）\n\n**第二部分：教师指导建议**\n- 个性化学习建议\n- 最值得优先改进的1-2个方面\n- 1个具体的练习建议\n- 鼓励性结尾`
  }
};

let currentMode = 'ai';

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.className = 'mode-tab');
  const map = { ai: 'active-teal', teacher: 'active-gold', hybrid: 'active-purple' };
  document.getElementById('tab-' + m).classList.add(map[m]);
}
function loadSample(i) { document.getElementById('essayInput').value = SAMPLES[i]; updateCount(); }
function updateCount() { document.getElementById('charCount').textContent = document.getElementById('essayInput').value.length + ' 字'; }
function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
function hideResult() { document.getElementById('resultSection').classList.remove('visible'); }

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/【(.+?)】/g, '<h3>【$1】</h3>')
    .replace(/^(\d+)\.\s/gm, '<br><strong>$1.</strong> ')
    .replace(/「(.+?)」/g, '<span class="error-highlight">$1</span>')
    .replace(/→\s*(.+?)$/gm, '<div class="suggestion">→ $1</div>')
    .replace(/✓\s*(.+?)$/gm, '<div class="praise">✓ $1</div>')
    .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
}

function parseScores(text) {
  const s1 = text.match(/准确性[：:]\s*(\d+)/);
  const s2 = text.match(/流利度[：:]\s*(\d+)/);
  const s3 = text.match(/内容[：:]\s*(\d+)/);
  if (!s1 && !s2 && !s3) return null;
  return [
    { label: '准确性', val: s1 ? s1[1] : '—' },
    { label: '流利度', val: s2 ? s2[1] : '—' },
    { label: '内容',   val: s3 ? s3[1] : '—' }
  ];
}

async function getFeedback() {
  const essay = document.getElementById('essayInput').value.trim();
  if (!essay)            { showError('请先输入华文作文内容。'); return; }
  if (essay.length < 20) { showError('作文太短，请输入至少 20 个字。'); return; }

  hideError(); hideResult();
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('btnText').textContent = '批改中…';
  document.getElementById('loading').classList.add('visible');

  const mode = MODES[currentMode];
  const msgs = ['正在仔细阅读作文…', '分析语法与用词…', '整理批改意见…', '即将完成…'];
  let li = 0;
  const t = setInterval(() => { document.getElementById('loadingText').textContent = msgs[li++ % msgs.length]; }, 1800);

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: mode.prompt,
        messages: [{ role: 'user', content: `请批改以下华文作文：\n\n${essay}` }]
      })
    });

    clearInterval(t);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || '未知错误');

    const feedback = data.content?.[0]?.text || '抱歉，未能获取反馈，请重试。';
    document.getElementById('loading').classList.remove('visible');

    const badge = document.getElementById('modeBadge');
    badge.textContent = mode.label;
    badge.className = 'mode-badge ' + mode.badge;
    document.getElementById('resultMeta').textContent = `共 ${essay.length} 字`;
    document.getElementById('resultContent').innerHTML = '<p>' + renderMarkdown(feedback) + '</p>';

    const scores = parseScores(feedback);
    document.getElementById('scoreRow').innerHTML = scores ? scores.map(s => `
      <div class="score-chip">
        <div class="score-label">${s.label}</div>
        <div class="score-val">${s.val}<span style="font-size:13px;font-weight:400;">/10</span></div>
      </div>`).join('') : '';

    document.getElementById('resultSection').classList.add('visible');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (err) {
    clearInterval(t);
    document.getElementById('loading').classList.remove('visible');
    showError('错误：' + err.message);
  }

  document.getElementById('submitBtn').disabled = false;
  document.getElementById('btnText').textContent = '获取反馈';
}

function clearAll() {
  document.getElementById('essayInput').value = '';
  updateCount(); hideError(); hideResult();
  document.getElementById('loading').classList.remove('visible');
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('resultContent').innerText)
    .then(() => alert('已复制到剪贴板！'));
}
</script>
</body>
</html>
